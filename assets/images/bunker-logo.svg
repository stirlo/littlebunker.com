<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <!-- Ice day gradient -->
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8ea"/>
      <stop offset="50%" style="stop-color:#4682b4"/>
      <stop offset="100%" style="stop-color:#71b5c9"/>
    </linearGradient>
    <!-- Fire dark gradient -->
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c00"/>
      <stop offset="50%" style="stop-color:#ff4500"/>
      <stop offset="100%" style="stop-color:#cd5c5c"/>
    </linearGradient>
    <!-- Shimmer -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="45%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="55%" style="stop-color:rgba(255,255,255,0.28)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <!-- Glass bg -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Glass pill background -->
  <rect x="2" y="2" width="316" height="76" rx="16" ry="16"
        fill="rgba(240,248,255,0.12)" stroke="rgba(70,130,180,0.35)" stroke-width="1.5"/>
  <!-- Shimmer layer -->
  <rect x="2" y="2" width="316" height="76" rx="16" ry="16"
        fill="url(#shimmer)" opacity="0.7"/>
  <!-- Top highlight line -->
  <line x1="20" y1="3" x2="300" y2="3" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round"/>

  <!-- Bunker icon — minimal geometric house/shelter shape -->
  <g transform="translate(16, 12)" filter="url(#glow)">
    <!-- Roof arc -->
    <path d="M4 34 Q14 10 28 34" fill="none" stroke="url(#iceGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Walls -->
    <rect x="4" y="34" width="24" height="18" rx="2"
          fill="none" stroke="url(#iceGrad)" stroke-width="2"/>
    <!-- Door -->
    <rect x="12" y="42" width="8" height="10" rx="1.5"
          fill="rgba(70,130,180,0.3)" stroke="url(#iceGrad)" stroke-width="1.5"/>
    <!-- Ground line -->
    <line x1="0" y1="52" x2="32" y2="52" stroke="url(#iceGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- LITTLE text -->
  <text x="60" y="30"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="11" font-weight="700" letter-spacing="0.25em"
        fill="url(#iceGrad)" opacity="0.85"
        text-anchor="start">LITTLE</text>

  <!-- BUNKER text — main wordmark -->
  <text x="58" y="56"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="26" font-weight="800" letter-spacing="-0.02em"
        fill="url(#iceGrad)"
        text-anchor="start">BUNKER</text>

  <!-- Accent dot -->
  <circle cx="251" cy="49" r="3.5" fill="url(#fireGrad)" opacity="0.9"/>
</svg>
